<script>
    // Загружаем историю при открытии страницы
    document.addEventListener('DOMContentLoaded', function() {
        console.log("Загружаем историю...");
        
        const historyList = document.getElementById('historyList');
        
        // СОЗДАЕМ ТЕСТОВУЮ ИСТОРИЮ С ЦИННИЕЙ
        const demoHistory = [
            {
                id: 1,
                plantName: '🌼 Цинния',
                confidence: 'Точность: 99%',
                image: 'https://images.unsplash.com/photo-1504198458649-3128b932f49e?w=400'
            },
        ];
        
        // СОХРАНЯЕМ В LOCALSTORAGE (чтобы потом добавлялись новые)
        localStorage.setItem('recognitionHistory', JSON.stringify(demoHistory));
        
        // ПОКАЗЫВАЕМ ИСТОРИЮ
        historyList.innerHTML = demoHistory.map(item => `
            <div class="history-item">
                <img src="${item.image}" 
                     alt="${item.plantName}"
                     style="width: 80px; height: 80px; object-fit: cover; border-radius: 10px;">
                <div style="flex: 1;">
                    <h3 style="margin: 0 0 5px 0; color: #333;">${item.plantName}</h3>
                    <p style="margin: 0 0 5px 0; color: #10b981;">${item.confidence}</p>
                    <p style="margin: 0; color: #666; font-size: 12px;">${item.date}</p>
                </div>
                <button onclick="deleteFromHistory(${item.id})" 
                        style="background: #fee2e2; color: #ef4444; border: none; width: 36px; height: 36px; border-radius: 8px; cursor: pointer;">
                    <i class="fas fa-trash"></i>
                </button>
            </div>
        `).join('');
    });
    
    // Функция удаления из истории
    window.deleteFromHistory = function(id) {
        let history = JSON.parse(localStorage.getItem('recognitionHistory') || '[]');
        history = history.filter(item => item.id !== id);
        localStorage.setItem('recognitionHistory', JSON.stringify(history));
        
        // Если история пуста, показываем сообщение
        if (history.length === 0) {
            document.getElementById('historyList').innerHTML = `
                <div class="empty">
                    <i class="fas fa-leaf" style="font-size: 48px; color: #ccc; margin-bottom: 15px;"></i>
                    <p>У вас пока нет сохраненных растений</p>
                </div>
            `;
        } else {
            location.reload(); // Перезагружаем страницу
        }
    };
</script>
