<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход - HelpingPlantsAI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-header i {
            font-size: 48px;
            color: #10b981;
            margin-bottom: 15px;
        }
        .auth-header h1 {
            color: #333;
            font-size: 24px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #10b981;
        }
        .auth-btn {
            width: 100%;
            padding: 14px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .auth-btn:hover {
            background: #059669;
            transform: translateY(-2px);
        }
        .auth-links {
            text-align: center;
            margin-top: 20px;
        }
        .auth-links a {
            color: #10b981;
            text-decoration: none;
        }
        .back-link {
            text-align: center;
            margin-top: 15px;
        }
        .back-link a {
            color: #666;
            text-decoration: none;
            font-size: 14px;
        }
        .error-message {
            color: #ef4444;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <i class="fas fa-seedling"></i>
            <h1>Вход в HelpingPlantsAI</h1>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <input type="email" id="loginEmail" placeholder="Email" required>
            </div>
            <div class="form-group">
                <input type="password" id="loginPassword" placeholder="Пароль" required>
            </div>
            <button type="submit" class="auth-btn">Войти</button>
        </form>
        
        <div class="auth-links">
            Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
        </div>
        <div class="back-link">
            <a href="index.html">← На главную</a>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://kit.fontawesome.com/your-code.js"></script>
    
    <script>
        // Firebase настройки
        const firebaseConfig = {
            apiKey: "AIzaSyDYTCaAyGSpUFu6-jKDn_wx_Xl7mP4lG68",
            authDomain: "helpingplantsai.firebaseapp.com",
            projectId: "helpingplantsai",
            storageBucket: "helpingplantsai.firebasestorage.app",
            messagingSenderId: "822289586033",
            appId: "1:822289586033:web:d13cf75c8d9628b9d048d0"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Вход
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            auth.signInWithEmailAndPassword(email, password)
                .then(function() {
                    alert('Вход выполнен!');
                    window.location.href = 'index.html';
                })
                .catch(function(error) {
                    alert('Ошибка: ' + error.message);
                });
        });
    </script>
</body>
</html>
